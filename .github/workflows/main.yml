name: Build & Deploy UI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: worknggupta/fleetbharat-ui
  CONTAINER_NAME: fleetbharat-ui
  PORT: 3000

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Docker Login
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 3. Build Image
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_APP_ENV="${{ secrets.NEXT_PUBLIC_APP_ENV }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_KEY="${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}" \
            --build-arg NEXT_PUBLIC_VTS_API_BASE_URL="${{ secrets.NEXT_PUBLIC_VTS_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_JAVA_API_BASE_URL="${{ secrets.NEXT_PUBLIC_JAVA_API_BASE_URL }}" \
            -t $IMAGE_NAME:${{ github.sha }} .

      # 4. Tag Image
      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      # 5. Push Image
      - name: Push Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      # 6. Deploy via SSH
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }} # ✅ FIXED
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ✅ Define variables inside SSH (IMPORTANT)
            IMAGE_NAME="worknggupta/fleetbharat-ui"
            CONTAINER_NAME="fleetbharat-ui"
            PORT="3000"

            echo "🔍 Debug..."
            echo "IMAGE_NAME=$IMAGE_NAME"
            echo "CONTAINER_NAME=$CONTAINER_NAME"

            # Safety check
            if [ -z "$IMAGE_NAME" ]; then
              echo "❌ IMAGE_NAME is empty"
              exit 1
            fi

            echo "🧹 Cleanup docker cache..."
            docker system prune -af || true
            docker volume prune -f || true
            docker builder prune -af || true

            echo "⬇️ Pull latest image..."
            if ! docker pull $IMAGE_NAME:latest; then
              echo "⚠️ Pull failed. Retrying after cleanup..."
              docker rm -f ${CONTAINER_NAME}-new || true
              docker rm -f $CONTAINER_NAME || true
              docker system prune -af || true
              docker pull $IMAGE_NAME:latest || exit 1
            fi

            echo "🚀 Start NEW container for test..."
            docker rm -f ${CONTAINER_NAME}-new || true

            docker run -d \
              --name ${CONTAINER_NAME}-new \
              -e NODE_ENV=production \
              $IMAGE_NAME:latest

            echo "⏳ Waiting for container startup..."
            sleep 10

            echo "🔍 Health check..."
            if docker exec ${CONTAINER_NAME}-new sh -c "(command -v curl >/dev/null && curl -fs http://localhost:3000) || (command -v wget >/dev/null && wget -qO- http://localhost:3000)" >/dev/null; then
              echo "✅ Health check passed!"
            else
              echo "❌ Health check failed! Rolling back..."
              docker logs ${CONTAINER_NAME}-new --tail 50 || true
              docker rm -f ${CONTAINER_NAME}-new || true
              exit 1
            fi

            echo "🔁 Replace old container..."
            docker rm -f $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              -p $PORT:3000 \
              --restart always \
              -e NODE_ENV=production \
              $IMAGE_NAME:latest

            docker rm -f ${CONTAINER_NAME}-new || true

            echo "✅ Deployment successful!"
